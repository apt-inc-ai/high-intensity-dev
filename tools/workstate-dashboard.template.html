<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Workstate Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23000'/><text x='16' y='22' text-anchor='middle' font-family='monospace' font-weight='bold' font-size='18' fill='%23e34' letter-spacing='-1'>W</text><rect x='2' y='26' width='28' height='3' rx='1' fill='%23e34'/></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000000;
    color: #c9d1d9;
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    font-size: 14px;
    padding: 24px;
    min-height: 100vh;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #21262d;
    position: relative;
  }
  .header-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #e6edf3;
    letter-spacing: 0.5px;
  }
  .header .meta {
    font-size: 12px;
    color: #7d8590;
    margin-top: 2px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-logo {
    height: 72px;
    border-radius: 6px;
  }
  .header-logo-right {
    height: 72px;
    border-radius: 6px;
  }
  .counts {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .count-badge {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
  }
  .count-badge .num {
    font-size: 20px;
    font-weight: 700;
    color: #e6edf3;
  }
  .count-badge .label {
    color: #7d8590;
    margin-left: 6px;
  }
  .counts-divider {
    width: 1px;
    height: 32px;
    background: #21262d;
  }
  .count-badge.usage .num { color: #d2a8ff; font-size: 16px; }
  .count-badge.usage .label { font-size: 11px; }
  .count-badge.system .num { font-size: 16px; }
  .count-badge.system .label { font-size: 11px; }
  .count-badge.system .num.ok { color: #3fb950; }
  .count-badge.system .num.warn { color: #d29922; }
  .count-badge.system .num.crit { color: #f85149; }
  .count-badge.railway .num { color: #58a6ff; font-size: 16px; }
  .count-badge.railway .label { font-size: 11px; }
  .count-badge.elevenlabs .num { font-size: 16px; }
  .count-badge.elevenlabs .label { font-size: 11px; }
  .count-badge.elevenlabs .num.ok { color: #3fb950; }
  .count-badge.elevenlabs .num.warn { color: #d29922; }
  .count-badge.elevenlabs .num.crit { color: #f85149; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 24px;
  }
  th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #7d8590;
    border-bottom: 1px solid #21262d;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid #161b22;
    vertical-align: top;
  }
  tr.session:hover { background: #161b22; }
  tr.thread { background: #0d1117; }
  tr.thread td { padding-left: 36px; font-size: 13px; color: #8b949e; }
  tr.thread:hover { background: #13181f; }
  .name-cell {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .session-name {
    cursor: pointer;
  }
  .session-name:hover {
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 3px;
  }
  .rename-input {
    background: #161b22;
    color: #e6edf3;
    border: 1px solid #3fb950;
    border-radius: 4px;
    padding: 2px 6px;
    font-family: inherit;
    font-size: inherit;
    outline: none;
    width: 220px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-ok { background: #3fb950; box-shadow: 0 0 6px #3fb95066; }
  .dot-warning { background: #d29922; box-shadow: 0 0 6px #d2992266; }
  .dot-idle { background: #484f58; box-shadow: 0 0 4px #484f5844; }
  .status {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .status-running { background: #23853320; color: #3fb950; border: 1px solid #23853350; }
  .status-thinking { background: #8b5cf620; color: #a78bfa; border: 1px solid #8b5cf650; }
  .status-idle { background: #21262d; color: #7d8590; border: 1px solid #30363d; }
  .status-awaiting-approval { background: #d2992220; color: #d29922; border: 1px solid #d2992250; }
  .status-up { background: #1f6feb20; color: #58a6ff; border: 1px solid #1f6feb50; }
  .status-blocked { background: #9e6a0320; color: #d29922; border: 1px solid #9e6a0350; }
  .status-failed { background: #da363420; color: #f85149; border: 1px solid #da363450; }
  .status-done { background: #21262d; color: #7d8590; border: 1px solid #30363d; }
  .risk-text { color: #d29922; font-size: 12px; }
  .risk-none { color: #484f58; }
  .last-seen { color: #7d8590; font-size: 12px; }
  .tab-text {
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
    color: #7d8590;
  }
  .task-text {
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .session-name {
    font-weight: 600;
    color: #e6edf3;
  }
  .thread-name {
    color: #8b949e;
    font-style: italic;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #484f58;
  }
  .empty-state h2 {
    font-size: 16px;
    margin-bottom: 8px;
    color: #7d8590;
  }
  .empty-state p { font-size: 13px; }
  .expired-section {
    border-top: 1px solid #21262d;
    padding-top: 16px;
    margin-top: 8px;
  }
  .expired-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #484f58;
    margin-bottom: 8px;
  }
  .expired-item {
    font-size: 12px;
    color: #484f58;
    padding: 2px 0;
  }
  .tooltip {
    position: relative;
    cursor: default;
  }
  .tooltip .tooltip-text {
    visibility: hidden;
    background: #1c2128;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px 12px;
    position: absolute;
    z-index: 10;
    top: 100%;
    left: 0;
    margin-top: 4px;
    font-size: 12px;
    white-space: pre-line;
    min-width: 250px;
    max-width: 400px;
    color: #8b949e;
    box-shadow: 0 4px 12px #00000040;
  }
  .tooltip:hover .tooltip-text { visibility: visible; }
  .warn-banner {
    background: #9e6a0315;
    border: 1px solid #9e6a0340;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 20px;
    color: #d29922;
    font-size: 13px;
    display: none;
  }
  .warn-banner.visible { display: block; }
  /* Service status indicators */
  .service-groups {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 24px;
  }
  .service-group h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #7d8590;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .services-row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }
  .service-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 6px;
    padding: 10px 16px;
    min-width: 200px;
    text-decoration: none;
    color: inherit;
    transition: all 0.15s;
  }
  .service-card:hover {
    background: #1c2128;
    border-color: #30363d;
  }
  .service-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .service-dot-online { background: #3fb950; box-shadow: 0 0 8px #3fb95066; }
  .service-dot-offline { background: #f85149; box-shadow: 0 0 8px #f8514966; animation: pulse-dot 1.5s ease-in-out infinite; }
  .service-dot-checking { background: #d29922; box-shadow: 0 0 6px #d2992266; animation: pulse-dot 1s ease-in-out infinite; }
  .service-dot-degraded { background: #d29922; box-shadow: 0 0 8px #d2992266; }
  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .service-info { display: flex; flex-direction: column; }
  .service-name { font-size: 13px; font-weight: 600; color: #e6edf3; }
  .service-url { font-size: 11px; color: #484f58; }
  .service-status { margin-left: auto; text-align: right; }
  .service-label { font-size: 11px; font-weight: 600; }
  .service-label-online { color: #3fb950; }
  .service-label-offline { color: #f85149; }
  .service-label-checking { color: #d29922; }
  .service-label-degraded { color: #d29922; }
  .service-latency { font-size: 10px; color: #484f58; }

  .page-groups {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 24px;
  }
  /* Local pages grid */
  .pages-section {
    margin-bottom: 0;
  }
  .pages-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #7d8590;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .pages-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .page-link {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 6px;
    padding: 8px 14px;
    text-decoration: none;
    color: #8b949e;
    font-size: 13px;
    transition: all 0.15s;
  }
  .page-link:hover {
    background: #1c2128;
    border-color: #30363d;
    color: #e6edf3;
  }
  .page-link svg {
    flex-shrink: 0;
    opacity: 0.5;
  }
  .page-link:hover svg { opacity: 0.9; }
  .page-link .route {
    font-size: 10px;
    color: #484f58;
    margin-left: 4px;
  }

  .watermark {
    position: fixed;
    bottom: 24px;
    pointer-events: none;
    z-index: 999;
  }
  .watermark-left { left: 24px; }
  .watermark img {
    width: 600px;
    height: auto;
    border-radius: 16px;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img class="header-logo" src="{{LOGO_DATA_URI}}" alt="Logo" style="display:{{LOGO_DISPLAY}}">
    </div>
    <div class="header-center">
      <h1>WORKSTATE DASHBOARD</h1>
      <div class="meta">auto-refresh: 5s</div>
    </div>
    <img class="header-logo-right" src="{{GUS_LOGO_URI}}" alt="GUS.ai" style="display:{{GUS_LOGO_DISPLAY}}">
  </div>
  <div id="warn-banner" class="warn-banner"></div>
  <div class="counts" id="counts"></div>

  <div id="service-groups" class="service-groups"></div>
  <div id="page-groups" class="page-groups"></div>

  <div id="content"></div>
  <div id="expired-section"></div>
  <div class="watermark watermark-left" style="display:{{LOGO_LEFT_DISPLAY}}">
    <img src="{{LOGO_LEFT_URI}}" alt="">
  </div>

<script>
const REFRESH_MS = 5000;

function relativeSafe(s) { return s || '?'; }

function statusClass(status) {
  const s = (status || '').toLowerCase().replace(/\\s+/g, '-');
  if (s === 'running') return 'status-running';
  if (s === 'thinking') return 'status-thinking';
  if (s === 'idle') return 'status-idle';
  if (s === 'awaiting-approval') return 'status-awaiting-approval';
  if (s === 'up') return 'status-up';
  if (s === 'blocked') return 'status-blocked';
  if (s === 'failed') return 'status-failed';
  return 'status-done';
}

function dotClass(staleness) {
  if (staleness === 'ok') return 'dot-ok';
  if (staleness === 'warning') return 'dot-warning';
  if (staleness === 'idle') return 'dot-idle';
  return 'dot-idle';
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text || '';
  return d.innerHTML;
}

function truncate(text, max) {
  if (!text) return '';
  return text.length > max ? text.slice(0, max) + '...' : text;
}

function fmtTokens(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'k';
  return String(n);
}
function pctClass(v) { return v >= 90 ? 'crit' : v >= 70 ? 'warn' : 'ok'; }

function serviceDotClass(state) {
  if (state === 'online') return 'service-dot service-dot-online';
  if (state === 'degraded') return 'service-dot service-dot-degraded';
  if (state === 'offline') return 'service-dot service-dot-offline';
  return 'service-dot service-dot-checking';
}

function serviceLabelClass(state) {
  if (state === 'online') return 'service-label service-label-online';
  if (state === 'degraded') return 'service-label service-label-degraded';
  if (state === 'offline') return 'service-label service-label-offline';
  return 'service-label service-label-checking';
}

function serviceMetaText(item) {
  if (item.latency_ms !== null && item.latency_ms !== undefined) return item.latency_ms + 'ms';
  return truncate(item.detail || '', 42);
}

function pageLinkIcon(action) {
  if (action === 'launch_pwsh') {
    return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>';
  }
  return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3h7v7"/><path d="M10 14 21 3"/><path d="M21 14v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>';
}

function renderServiceGroups(services, dashboard) {
  const serviceGroupsEl = document.getElementById('service-groups');
  const groups = (dashboard && dashboard.service_groups) || [];
  const itemMap = new Map(((services && services.items) || []).map(item => [item.id, item]));

  serviceGroupsEl.innerHTML = groups.map(group => {
    const cards = (group.services || []).map(service => {
      const item = itemMap.get(service.id) || {
        id: service.id,
        name: service.name,
        display_url: service.display_url,
        link_url: service.link_url || service.probe_url || '',
        state: 'checking',
        label: 'Checking...',
        detail: 'Pending refresh',
        latency_ms: null,
      };
      const href = item.link_url || service.link_url || service.probe_url || '';
      const detail = item.detail || '';
      const meta = serviceMetaText(item);
      const body = `
        <div class="${serviceDotClass(item.state)}"></div>
        <div class="service-info">
          <span class="service-name">${escapeHtml(item.name || service.name || 'Unnamed service')}</span>
          <span class="service-url">${escapeHtml(item.display_url || service.display_url || '')}</span>
        </div>
        <div class="service-status">
          <div class="${serviceLabelClass(item.state)}">${escapeHtml(item.label || 'Checking...')}</div>
          <div class="service-latency">${escapeHtml(meta)}</div>
        </div>
      `;
      if (href) {
        return `<a class="service-card" href="${escapeHtml(href)}" target="_blank" rel="noreferrer" title="${escapeHtml(detail)}">${body}</a>`;
      }
      return `<div class="service-card" title="${escapeHtml(detail)}">${body}</div>`;
    }).join('');
    return `
      <div class="service-group">
        <h3>${escapeHtml(group.title || 'Services')}</h3>
        <div class="services-row">${cards}</div>
      </div>
    `;
  }).join('');
}

function renderPageGroups(dashboard) {
  const pageGroupsEl = document.getElementById('page-groups');
  const groups = (dashboard && dashboard.page_groups) || [];

  pageGroupsEl.innerHTML = groups.map(group => {
    const links = (group.links || []).map(link => {
      const route = escapeHtml(link.route || '');
      const label = escapeHtml(link.label || 'Link');
      const icon = pageLinkIcon(link.action || '');
      if (link.action === 'launch_pwsh') {
        return `
          <a class="page-link" href="#" data-action="launch_pwsh">
            ${icon}
            ${label} <span class="route">${route}</span>
          </a>
        `;
      }
      const href = escapeHtml(link.url || '#');
      return `
        <a class="page-link" href="${href}" target="_blank" rel="noreferrer">
          ${icon}
          ${label} <span class="route">${route}</span>
        </a>
      `;
    }).join('');
    return `
      <div class="pages-section">
        <h3>${escapeHtml(group.title || 'Pages')}</h3>
        <div class="pages-grid">${links}</div>
      </div>
    `;
  }).join('');

  pageGroupsEl.querySelectorAll('[data-action="launch_pwsh"]').forEach(link => {
    link.addEventListener('click', async event => {
      event.preventDefault();
      try {
        await fetch('/api/launch-pwsh');
        link.style.color = '#3fb950';
      } catch (err) {
        link.style.color = '#f85149';
      }
    });
  });
}

function renderTable(data) {
  const { sessions, expired, counts, usage, system, railway, elevenlabs, services, dashboard } = data;

  // Counts + Usage + System + Railway
  const countsEl = document.getElementById('counts');
  const totalThreads = sessions.reduce((sum, s) => sum + (s.threads || []).length, 0);
  const u = usage || {};
  const totalTokens = (u.input_tokens||0) + (u.output_tokens||0) + (u.cache_write_tokens||0) + (u.cache_read_tokens||0);
  const sys = system || {};
  const rw = railway || {};
  const rwBe = rw.backend || {};
  const rwFe = rw.frontend || {};
  const rwEst = rw.estimated || {};
  const railwayBadges = rw.configured ? `
    <div class="counts-divider"></div>
    <div class="count-badge railway"><span class="num">${rwBe.cpu||0}%</span><span class="label">RW BE CPU</span></div>
    <div class="count-badge railway"><span class="num">${rwBe.mem_mb||0}</span><span class="label">MB BE RAM</span></div>
    <div class="count-badge railway"><span class="num">${rwFe.cpu||0}%</span><span class="label">RW FE CPU</span></div>
    <div class="count-badge railway"><span class="num">${rwFe.mem_mb||0}</span><span class="label">MB FE RAM</span></div>
    <div class="count-badge railway"><span class="num">${rwEst.net_tx_gb||0}</span><span class="label">GB egress</span></div>
  ` : '';
  const elevenlabsBadge = (() => {
    const el = elevenlabs || {};
    if (!el.limit) return '';
    const fmtK = v => v >= 1000000 ? (v/1000000).toFixed(1) + 'M' : v >= 1000 ? (v/1000).toFixed(1) + 'K' : v;
    return `<div class="counts-divider"></div><div class="count-badge elevenlabs"><span class="num ${pctClass(el.pct||0)}">${fmtK(el.used)} / ${fmtK(el.limit)}</span><span class="label">chars (${el.pct||0}%) ElevenLabs</span></div>`;
  })();
  countsEl.innerHTML = `
    <div class="count-badge"><span class="num">${counts.sessions}</span><span class="label">sessions</span></div>
    <div class="count-badge"><span class="num">${totalThreads}</span><span class="label">threads</span></div>
    <div class="counts-divider"></div>
    <div class="count-badge usage"><span class="num">${fmtTokens(totalTokens)}</span><span class="label">tokens</span></div>
    <div class="count-badge usage"><span class="num">$${(u.cost_usd||0).toFixed(2)}</span><span class="label">cost</span></div>
    <div class="counts-divider"></div>
    <div class="count-badge system"><span class="num ${pctClass(sys.cpu_pct||0)}">${sys.cpu_pct||0}%</span><span class="label">CPU</span></div>
    <div class="count-badge system"><span class="num ${pctClass(sys.mem_pct||0)}">${sys.mem_pct||0}%</span><span class="label">RAM ${sys.mem_used_gb||0}/${sys.mem_total_gb||0} GB</span></div>
    <div class="count-badge system"><span class="num ${pctClass(sys.disk_pct||0)}">${sys.disk_pct||0}%</span><span class="label">Disk ${sys.disk_used_gb||0}/${sys.disk_total_gb||0} GB</span></div>
    ${railwayBadges}
    ${elevenlabsBadge}
  `;

  renderServiceGroups(services, dashboard);
  renderPageGroups(dashboard);

  // Warning banner
  const banner = document.getElementById('warn-banner');
  const activeCount = counts.sessions;
  if (activeCount >= 3) {
    banner.textContent = 'Advisory: ' + activeCount + ' active sessions. Consider whether all threads need your attention right now.';
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }

  // Content
  const content = document.getElementById('content');
  if (sessions.length === 0) {
    content.innerHTML = `
      <div class="empty-state">
        <h2>No active sessions</h2>
        <p>Claude Code sessions will appear here when they report in.</p>
      </div>`;
  } else {
    let html = `<table>
      <thead><tr>
        <th style="width:30px">#</th>
        <th>Session</th>
        <th>Tab</th>
        <th>Task</th>
        <th>Status</th>
        <th>Risk</th>
        <th>Last seen</th>
      </tr></thead><tbody>`;

    sessions.forEach((s, i) => {
      const historyTip = s.history && s.history.length > 0
        ? s.history.map(h => escapeHtml(h)).join('\\n')
        : 'No history';
      html += `<tr class="session">
        <td>${i + 1}</td>
        <td>
          <div class="name-cell tooltip">
            <span class="dot ${dotClass(s.staleness)}"></span>
            <span class="session-name" data-sid="${escapeHtml(s.session_id)}" onclick="startRename(this)">${escapeHtml(s.name)}</span>
            <span class="tooltip-text">${historyTip}</span>
          </div>
        </td>
        <td class="tab-text">${escapeHtml(s.tab || '')}</td>
        <td><div class="task-text">${escapeHtml(s.task)}</div></td>
        <td><span class="status ${statusClass(s.status)}">${escapeHtml(s.status)}</span></td>
        <td class="${s.risk === '-' ? 'risk-none' : 'risk-text'}">${escapeHtml(s.risk)}</td>
        <td class="last-seen">${relativeSafe(s.last_seen_relative)}</td>
      </tr>`;

      (s.threads || []).forEach((t, ti) => {
        html += `<tr class="thread">
          <td style="color:#484f58">${i + 1}.${ti + 1}</td>
          <td>
            <div class="name-cell">
              <span class="dot ${dotClass(t.staleness)}"></span>
              <span class="thread-name">${escapeHtml(t.name)}</span>
            </div>
          </td>
          <td></td>
          <td><div class="task-text">${escapeHtml(t.task)}</div></td>
          <td><span class="status ${statusClass(t.status)}">${escapeHtml(t.status)}</span></td>
          <td class="${t.risk === '-' ? 'risk-none' : 'risk-text'}">${escapeHtml(t.risk)}</td>
          <td class="last-seen">${relativeSafe(t.last_seen_relative)}</td>
        </tr>`;
      });
    });

    html += '</tbody></table>';
    content.innerHTML = html;
  }

  // Expired section
  const expiredEl = document.getElementById('expired-section');
  if (expired && expired.length > 0) {
    let ehtml = '<div class="expired-section"><h3>Recently Expired</h3>';
    expired.slice().reverse().forEach(e => {
      ehtml += `<div class="expired-item">"${escapeHtml(e.name)}" - last task: ${escapeHtml(e.last_task)}</div>`;
    });
    ehtml += '</div>';
    expiredEl.innerHTML = ehtml;
  } else {
    expiredEl.innerHTML = '';
  }
}

function startRename(span) {
  const sid = span.dataset.sid;
  const oldName = span.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'rename-input';
  input.value = oldName;

  function commit() {
    const newName = input.value.trim();
    if (newName && newName !== oldName) {
      fetch(`/api/session/${encodeURIComponent(sid)}/name`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: newName}),
      }).then(() => refresh());
    }
    cancel();
  }

  function cancel() {
    if (input.parentNode) {
      input.replaceWith(span);
      span.textContent = input.value.trim() || oldName;
    }
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });
  input.addEventListener('blur', commit);

  span.replaceWith(input);
  input.focus();
  input.select();
}

async function refresh() {
  try {
    const resp = await fetch('/api/sessions');
    const data = await resp.json();
    renderTable(data);
  } catch (err) {
    // Server might be restarting, ignore
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
